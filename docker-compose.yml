version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: emergency-db
    environment:
      POSTGRES_USER: ${DB_USER:-emergency_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-emergency_password}
      POSTGRES_DB: ${DB_NAME:-emergency_response_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - emergency-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-emergency_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emergency-redis
    ports:
      - "6379:6379"
    networks:
      - emergency-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: emergency-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-emergency_user}
      DB_PASSWORD: ${DB_PASSWORD:-emergency_password}
      DB_NAME: ${DB_NAME:-emergency_response_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BACKEND_PORT: ${BACKEND_PORT:-5000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - emergency-network
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: emergency-frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - emergency-network
    volumes:
      - ./frontend/src:/app/src

  ai-engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-engine
    container_name: emergency-ai-engine
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-emergency_user}
      DB_PASSWORD: ${DB_PASSWORD:-emergency_password}
      DB_NAME: ${DB_NAME:-emergency_response_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_MODEL: ${AI_MODEL:-gpt-4}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - emergency-network
    volumes:
      - ./ai-engine/src:/app/src

volumes:
  postgres_data:

networks:
  emergency-network:
    driver: bridge
